    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background: #020208;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        /* --- خلفية الفضاء --- */
        .space-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0a25 0%, #010105 100%);
            z-index: -1;
        }

        /* تم تقليل التعقيد في النجوم لتخفيف اللاج */
        .stars-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1.5px 1.5px at 25% 35%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 50% 50%, #fff, transparent),
                radial-gradient(2px 2px at 70% 80%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 15% 75%, #fff, transparent);
            background-size: 200px 200px;
            animation: stars-twinkle 5s ease-in-out infinite alternate;
            will-change: opacity; /* تم إزالة transform لتخفيف الرام */
        }

        @keyframes stars-twinkle {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* --- البطاقة مع شعاعين ضوئيين --- */
        .animated-border-card {
            position: relative;
            width: 320px;
            border-radius: 2.5rem;
            overflow: hidden;
            padding: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8); /* تم تقليل الظل قليلاً */
        }

        .animated-border-card::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #ffffff);
            animation: rotate-border 8s linear infinite;
            will-change: transform;
        }

        .animated-border-card::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, rgba(255, 255, 255, 0.5));
            animation: rotate-border 8s linear infinite;
            animation-delay: -4s;
            will-change: transform;
        }

        @keyframes rotate-border {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* المحتوى الداخلي للبطاقة */
        .card-content {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 28, 0.85);
            /* تم تقليل الـ blur لتسريع الهاتف بشكل ملحوظ */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: calc(2.5rem - 3px);
            z-index: 10;
            padding: 26px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .img-frame {
            border: 1px solid #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* تصميم الأزرار (بدون blur لتجنب اللاج) */
        .glass-btn {
            background: rgba(255, 255, 255, 0.08); /* لون شفاف بدون ضباب */
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-btn:active {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffffff;
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <!-- خلفية الفضاء (طبقتين فقط تكفي جداً للمنظر الجمالي وتمنع اللاج) -->
    <div class="space-background">
        <div class="stars-layer"></div>
        <div class="stars-layer" style="background-size: 300px 300px; animation-duration: 7s; opacity: 0.6; animation-delay: -2s;"></div>
    </div>

    <!-- البطاقة الرئيسية -->
    <div class="animated-border-card">
        <div class="card-content">
            
            <!-- تم إضافة w_300,q_auto,f_auto لرابط الصورة لضغطها وتسريعها -->

                 alt="غلاف آية" 
                 class="w-32 aspect-[9/16] object-cover rounded-2xl mb-7 img-frame">

                بحبك يا أجمل بنوتة
            </h1>

            <div class="grid grid-cols-1 gap-4 w-full">
                <div class="grid grid-cols-2 gap-3">
                    <a href="Aya4.html" class="glass-btn py-3 text-sm rounded-xl">صفحة آية (1)</a>
                    <a href="Aya1.html" class="glass-btn py-3 text-sm rounded-xl">صفحة آية (2)</a>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <a href="Aya2.html" class="glass-btn py-3 text-sm rounded-xl">صفحة آية (3)</a>
                    <a href="Aya3.html" class="glass-btn py-3 text-sm rounded-xl">صفحة آية (4)</a>
                </div>
                <a href="Aya.html" class="glass-btn py-3.5 text-sm rounded-xl w-full border-white/40">
                      صفحة آية (5) 
                </a>
            </div>

        </div>
    </div>

</body>
</html>
