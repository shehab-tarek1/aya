    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background: #020208;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            /* منع تحديد النص وتأثيرات المتصفح الافتراضية لمنع الزوم العشوائي */
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        /* --- خلفية الفضاء --- */
        .space-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0a0a25 0%, #010105 100%);
            z-index: -1;
            contain: paint; 
        }

        /* طبقات النجوم المتعددة */
        .stars-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 10% 10%, #fff, transparent),
                radial-gradient(1.2px 1.2px at 25% 35%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 50% 50%, #fff, transparent),
                radial-gradient(1px 1px at 85% 15%, #fff, transparent),
                radial-gradient(1.1px 1.1px at 95% 85%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 15% 75%, #fff, transparent),
                radial-gradient(1px 1px at 40% 60%, #fff, transparent),
                radial-gradient(2px 2px at 70% 80%, #fff, transparent),
                radial-gradient(1px 1px at 75% 25%, #fff, transparent),
                radial-gradient(1.3px 1.3px at 35% 15%, #fff, transparent);
            background-size: 180px 180px;
            animation: stars-twinkle 6s ease-in-out infinite alternate;
            transform: translateZ(0);
            will-change: transform, opacity;
        }

        @keyframes stars-twinkle {
            0% { opacity: 0.3; transform: scale(0.98) translateZ(0); }
            100% { opacity: 1; transform: scale(1.02) translateZ(0); }
        }

        /* --- البطاقة مع شعاعين ضوئيين --- */
        .animated-border-card {
            position: relative;
            width: 320px;
            border-radius: 2.5rem;
            overflow: hidden;
            padding: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            transform: translateZ(0);
        }

        /* الشعاع الأول */
        .animated-border-card::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #ffffff);
            animation: rotate-border 12s linear infinite;
            will-change: transform;
        }

        /* الشعاع الثاني */
        .animated-border-card::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, rgba(255, 255, 255, 0.6));
            animation: rotate-border 12s linear infinite;
            animation-delay: -6s;
            will-change: transform;
        }

        @keyframes rotate-border {
            0% { transform: rotate(0deg) translateZ(0); }
            100% { transform: rotate(360deg) translateZ(0); }
        }

        /* المحتوى الداخلي للبطاقة */
        .card-content {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 28, 0.92);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: calc(2.5rem - 3px);
            z-index: 10;
            padding: 26px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            transform: translateZ(0);
            will-change: transform;
        }

        /* نجوم داخل البطاقة */
        .card-stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(1px 1px at 50% 50%, white, transparent);
            background-size: 50px 50px;
            opacity: 0.25;
            z-index: -1;
            transform: translateZ(0);
        }

        /* إطار الصورة - أبيض ورفيع */
        .img-frame {
            border: 1px solid #ffffff; /* تم تصغير الإطار وجعله أبيض نقي */
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
            transform: translateZ(0);
        }

        /* تصميم الأزرار الزجاجية بإطار أبيض (مخصص للمس والهواتف) */
        .glass-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
            transform: translateZ(0);
            text-decoration: none;
            -webkit-tap-highlight-color: transparent; /* إخفاء المربع الرمادي عند اللمس في بعض الهواتف */
        }

        /* تأثير اللمس فقط بدلاً من الماوس */
        .glass-btn:active {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffffff;
            transform: translateY(2px) translateZ(0);
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1);
        }
