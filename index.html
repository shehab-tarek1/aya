<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>رسائل آية</title>

    <meta property="og:title" content="رسائل آية 💖">
    <meta property="og:description" content="من شهاب لأجمل بنوتة.. اية اختاري الصفحة ✨">
    <meta property="og:image" content="https://res.cloudinary.com/db9h7zm1h/image/upload/w_600,q_auto,f_auto/v1771008727/jpfmjcfcbjfy60yu68qf.jpg">
    <meta property="og:type" content="website">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="♥Aya">
    <meta name="theme-color" content="#020208">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/db9h7zm1h/image/upload/w_192,h_192,c_fill,q_auto,f_auto/v1771008727/jpfmjcfcbjfy60yu68qf.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body, html {
            height: 100%; margin: 0; font-family: 'Tajawal', sans-serif;
            background: #020208; color: #ffffff; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            -webkit-user-select: none; user-select: none;
            -webkit-touch-callout: none; touch-action: manipulation;
        }

        .space-background {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #0a0a25 0%, #010105 100%); z-index: -1;
        }

        /* النجوم: 5 ثواني × 20 فريم = 100 خطوة */
        .stars-layer {
            position: absolute; width: 100%; height: 100%;
            background-image: 
                radial-gradient(1.5px 1.5px at 25% 35%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 50% 50%, #fff, transparent),
                radial-gradient(2px 2px at 70% 80%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 15% 75%, #fff, transparent);
            background-size: 200px 200px;
            /* تم إضافة steps(100) هنا */
            animation: stars-twinkle 5s steps(100) infinite alternate;
            will-change: opacity;
        }
        @keyframes stars-twinkle { 0% { opacity: 0.4; } 100% { opacity: 1; } }

        .animated-border-card {
            position: relative; width: 320px; border-radius: 2.5rem;
            overflow: hidden; padding: 3px; display: flex;
            justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }
        
        /* الإطار المضيء: 8 ثواني × 20 فريم = 160 خطوة */
        .animated-border-card::before {
            content: ''; position: absolute; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #ffffff);
            /* تم إضافة steps(160) هنا */
            animation: rotate-border 8s steps(160) infinite; will-change: transform;
        }
        .animated-border-card::after {
            content: ''; position: absolute; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, rgba(255, 255, 255, 0.5));
            /* تم إضافة steps(160) هنا */
            animation: rotate-border 8s steps(160) infinite; animation-delay: -4s; will-change: transform;
        }
        @keyframes rotate-border { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .card-content {
            position: relative; width: 100%; height: 100%;
            background: rgba(10, 10, 28, 0.85);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: calc(2.5rem - 3px); z-index: 10;
            padding: 26px; display: flex; flex-direction: column; align-items: center;
        }
        
        .img-frame { border: 1px solid #ffffff; box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); }
        
        .glass-btn {
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; transition: all 0.2s ease; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
            text-decoration: none; -webkit-tap-highlight-color: transparent;
        }
        .glass-btn:active { background: rgba(255, 255, 255, 0.2); border-color: #ffffff; transform: translateY(2px); }
    </style>
</head>
<body>

    <div class="space-background">
        <div class="stars-layer"></div>
        <!-- الطبقة الثانية للنجوم: 7 ثواني × 20 فريم = 140 خطوة -->
        <div class="stars-layer" style="background-size: 300px 300px; animation-duration: 7s; animation-timing-function: steps(140); opacity: 0.6; animation-delay: -2s;"></div>
    </div>

    <div class="animated-border-card">
        <div class="card-content">
            <img src="https://res.cloudinary.com/db9h7zm1h/image/upload/w_300,q_auto,f_auto/v1771008727/jpfmjcfcbjfy60yu68qf.jpg" 
                 alt="غلاف آية" 
                 class="w-32 aspect-[9/16] object-cover rounded-2xl mb-7 img-frame">

            <h1 class="text-xl font-extrabold text-white mb-6 text-center tracking-wide drop-shadow-md">
                بحبك يا أجمل بنوتة
            </h1>

            <div class="grid grid-cols-1 gap-4 w-full">
                <div class="grid grid-cols-2 gap-3">
                    <a href="Aya4.html" class="glass-btn py-3 text-sm rounded-xl">صفحة آية (1)</a>
                    <a href="Aya1.html" class="glass-btn py-3 text-sm rounded-xl">صفحة آية (2)</a>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <a href="Aya2.html" class="glass-btn py-3 text-sm rounded-xl">صفحة آية (3)</a>
                    <a href="Aya3.html" class="glass-btn py-3 text-sm rounded-xl">صفحة آية (4)</a>
                </div>
                <a href="Aya.html" class="glass-btn py-3.5 text-sm rounded-xl w-full border-white/40">
                      صفحة آية (5) 
                </a>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('تم تسجيل ServiceWorker بنجاح!');
                    })
                    .catch(err => {
                        console.log('فشل تسجيل ServiceWorker: ', err);
                    });
            });
        }
    </script>
</body>
</html>
